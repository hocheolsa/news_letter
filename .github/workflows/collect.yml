name: collect-news

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.12 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 수집기 문법 검사
        run: python -m py_compile scripts/collect_news.py

      - name: 뉴스 수집 실행
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ENABLE_GEMINI: ${{ vars.ENABLE_GEMINI }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
        run: python scripts/collect_news.py

      - name: 결과 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/news_latest.json docs/data/gemini_usage.json
          git diff --staged --quiet || git commit -m "chore: update news $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M') KST"
          git push
